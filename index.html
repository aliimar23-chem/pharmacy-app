<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pharmacy Inventory App</title>
    <meta name="theme-color" content="#1a73e8" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <!-- Simple styles are loaded from the external stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Pharmacy Inventory</h1>
      <nav class="nav-bar">
        <button id="scanBtn">Scan Product</button>
        <button id="addBtn">Add Product</button>
        <button id="inventoryBtn">Inventory</button>
      </nav>
    </header>

    <!-- Feedback messages appear here -->
    <div id="message" class="message"></div>

    <!-- Section for scanning barcodes using the phone camera -->
    <section id="scanSection" class="section">
      <h2>Scan Product</h2>
      <div class="scanner">
        <video
          id="video"
          autoplay
          playsinline
          muted
          width="100%"
          height="auto"
        ></video>
        <div id="scanOverlay" class="overlay"></div>
      </div>
      <button id="stopScanBtn" class="secondary">Stop Scanning</button>
      <div id="scanResult" class="scan-result"></div>
      <div id="manualScan" class="manual-scan">
        <label for="manualBarcode">Enter barcode manually:</label>
        <input type="text" id="manualBarcode" placeholder="Barcode" />
        <button id="manualSearch" class="primary">Search</button>
      </div>
    </section>

    <!-- Section for adding or editing a product -->
    <section id="addSection" class="section">
      <h2>Add / Edit Product</h2>
      <form id="productForm" autocomplete="off">
        <!-- Hidden field used when editing an existing product -->
        <input type="hidden" id="productId" />
        <div class="form-group">
          <label for="barcode">Barcode:</label>
          <input type="text" id="barcode" required />
        </div>
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" required />
        </div>
        <div class="form-group">
          <label for="price">Price (EGP):</label>
          <input type="number" id="price" min="0" step="0.01" required />
        </div>
        <div class="form-group">
          <label for="quantity">Quantity:</label>
          <input type="number" id="quantity" min="0" required />
        </div>
        <div class="form-group">
          <label for="expiry">Expiry Date:</label>
          <input type="date" id="expiry" />
        </div>
        <div class="form-group">
          <label for="minStock">Minimum Stock:</label>
          <input type="number" id="minStock" min="0" value="0" />
        </div>
        <div class="form-actions">
          <button type="submit" class="primary">Save</button>
          <button type="button" id="cancelAdd" class="secondary">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Section for displaying the current inventory -->
    <section id="inventorySection" class="section">
      <h2>Inventory</h2>
      <div class="export-wrapper">
        <button id="exportBtn" class="primary">Export CSV</button>
      </div>
      <table id="inventoryTable">
        <thead>
          <tr>
            <th>Barcode</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Expiry</th>
            <th>Min Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Core application logic -->
    <script src="script.js"></script>
  </body>
</html>
